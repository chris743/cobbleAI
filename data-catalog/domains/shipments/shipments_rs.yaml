  - name: INVENTORYIDX
    type: int
    nullable: true
    description: "Inventory record index."
  - name: ProductProductIdx
    type: int
    nullable: true
    description: "Product index at fill level."
  - name: ProductTimestamp
    type: datetime2
    nullable: true
    description: "Product detail timestamp."
  - name: GlDeleteCode
    type: nvarchar(1)
    nullable: true
    description: "GL delete code."
  - name: TAGIDX
    type: int
    nullable: true
    description: "Tag index."
  - name: WAREHOUSEIDX
    type: int
    nullable: true
    description: "Warehouse index."
  - name: RECEIVEDATE
    type: datetime2
    nullable: true
    description: "Receive date of inventory used."

relationships:
  - target: dbo.VW_PRODUCTS
    join_column: ProductProductIdx
    target_column: ProductIdx
    cardinality: many-to-one
    note: "Product details"

  - target: dbo.VW_LP_LOTS
    join_column: GALOTIDX
    target_column: GALOTIDX
    cardinality: many-to-one
    note: "Pool/lot lookup"

  - target: dbo.VW_BLOCKS
    join_column: GABLOCKIDX
    target_column: GABLOCKIDX
    cardinality: many-to-one
    note: "Block traceability"

common_filters:
  - column: IsDeleted
    operation: "= 0"
    description: "ALWAYS filter to active records"

  - column: SHIPDATETIME
    operation: ">= DATEADD(day, -30, GETDATE())"
    description: "Last 30 days"

  - column: DELETEFLAG
    operation: "= 'N'"
    description: "Non-deleted lines"

sample_queries:
  - description: "Shipments by customer last 30 days"
    sql: |
      SELECT Customer,
        COUNT(DISTINCT SONO) as OrderCount,
        SUM(FinalEquivQty) as TotalStdCartons,
        SUM(SALEAMT) as TotalRevenue
      FROM rpt.vw_Shipments_RS
      WHERE IsDeleted = 0
        AND SHIPDATETIME >= DATEADD(day, -30, GETDATE())
        AND DELETEFLAG = 'N'
        AND GlDeleteCode = 'N'
      GROUP BY Customer
      ORDER BY TotalRevenue DESC

  - description: "Shipments by pool/lot"
    sql: |
      SELECT l.ID as PoolCode,
        SUM(s.FinalEquivQty) as StdCartons,
        SUM(s.GASETLAMT) as SettlementAmt
      FROM rpt.vw_Shipments_RS s
      JOIN dbo.VW_LP_LOTS l ON s.GALOTIDX = l.GALOTIDX
      WHERE s.IsDeleted = 0
        AND s.SHIPDATETIME >= DATEADD(day, -30, GETDATE())
      GROUP BY l.ID
      ORDER BY StdCartons DESC

  - description: "Salesperson performance"
    sql: |
      SELECT Salesperson,
        COUNT(DISTINCT SONO) as Orders,
        SUM(FinalEquivQty) as Volume,
        SUM(SALEAMT) as Revenue
      FROM rpt.vw_Shipments_RS
      WHERE IsDeleted = 0
        AND SHIPDATETIME >= DATEADD(day, -30, GETDATE())
      GROUP BY Salesperson
      ORDER BY Revenue DESC

notes: |
  - PREFERRED over VW_E_SHIPMENTS (adds IsDeleted flag)
  - ALWAYS filter IsDeleted = 0 for active records
  - Very large (~545K rows) - always filter by date range
  - Multiple rows per order line (one per inventory tag used to fill)
  - LineQnt is order-level; ICQNT is fill-level
  - Use FinalEquivQty for standardized carton reporting
  - GASETLAMT = grower's settlement share per fill
  - GALOTIDX links to pool/lot; GABLOCKIDX links to grower block

