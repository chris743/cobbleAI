  - name: ARTRXLINESEQ
    type: int
    nullable: true
    description: "Line sequence."
  - name: LINENO
    type: int
    nullable: true
    description: "Line number."
  - name: DELETEFLAG
    type: varchar(1)
    nullable: true
    description: "Line delete flag."
  - name: LineProductIdx
    type: int
    nullable: true
    description: "Line product index."
  - name: LINETYPE
    type: varchar(1)
    nullable: true
    description: "Line type."
  - name: INVCDESCROVERRIDEFLAG
    type: varchar(1)
    nullable: true
    description: "Description override flag."
  - name: CONSIGNFLAG
    type: varchar(1)
    nullable: true
    description: "Consignment flag."
  - name: PAYHOLDFLAG
    type: varchar(1)
    nullable: true
    description: "Payment hold flag."
  - name: UOMIDX
    type: int
    nullable: true
    description: "UOM index."
  - name: UNITSPERPALLET
    type: int
    nullable: true
    description: "Units per pallet."
  - name: GROUPARTRXLINESEQ
    type: int
    nullable: true
    description: "Grouped line sequence."
  - name: CONTRACTIDX
    type: int
    nullable: true
    description: "Contract index."
  - name: ARSOLINESEQ
    type: int
    nullable: true
    description: "SO line sequence."
  - name: LineTimestamp
    type: datetime2
    nullable: true
    description: "Line timestamp."
  - name: Product_SourceDB
    type: nvarchar(20)
    nullable: true
    description: "Product source DB."
  - name: ARTRXDTLSEQ
    type: int
    nullable: true
    description: "Detail sequence."
  - name: ProductLineTrxType
    type: nvarchar(2)
    nullable: true
    description: "Product line trx type."
  - name: ProductLineSeq
    type: int
    nullable: true
    description: "Product line sequence."
  - name: TRXTYPE
