# Schema documentation for rpt.vw_Shipments_RS
# Preferred shipment view with IsDeleted flag - LP system

name: rpt.vw_Shipments_RS
short_name: vw_Shipments_RS
schema: rpt
domain: shipments
system: LP

description: |
  Preferred shipment detail view. Same structure as VW_E_SHIPMENTS plus an
  IsDeleted soft-delete flag. Use this view for all shipment analysis.

  Each row = one product fill detail (a specific inventory tag used to fill an order line).
  Flattened from header + line + product detail hierarchy.

business_purpose: |
  - PRIMARY view for all shipment analysis (preferred over VW_E_SHIPMENTS)
  - Customer shipment history with soft-delete filtering
  - Revenue and pricing detail
  - Grower settlement traceability (GASETLAMT, GABLOCKIDX, GALOTIDX)
  - Salesperson performance

row_count_approx: 544996
refresh_frequency: "Real-time sync from LP system"

columns:
  # All columns are identical to VW_E_SHIPMENTS except for the addition of IsDeleted.
  # See e_shipments.yaml for full column descriptions.

  # === KEY COLUMNS (see e_shipments.yaml for complete list) ===
  - name: Header_SourceDB
    type: nvarchar(20)
    nullable: true
    description: "Source database. Always 'LP'."

  - name: SONO
    type: nvarchar(8)
    nullable: true
    description: "Sales order number."

  - name: Customer
    type: nvarchar(40)
    nullable: true
    description: "Customer name."

  - name: CustomerID
    type: nvarchar(6)
    nullable: true
    description: "Customer ID code."

  - name: ShipToDesc
    type: nvarchar(40)
    nullable: true
    description: "Ship-to destination."

  - name: SOStatus
    type: nvarchar(100)
    nullable: true
    description: "Order status."

  - name: SODATETIME
    type: datetime2
    nullable: true
    description: "Sales order date."

  - name: SHIPDATETIME
    type: datetime2
    nullable: true
    description: "Ship date."

  - name: INVOICEDATE
    type: datetime2
    nullable: true
    description: "Invoice date."

  - name: Salesperson
    type: nvarchar(40)
    nullable: true
    description: "Salesperson name."

  - name: CarrierName
    type: nvarchar(40)
    nullable: true
    description: "Freight carrier name."

  - name: IsDeleted
    type: bit
    nullable: false
    description: "Soft delete flag. 0 = active record, 1 = deleted. ALWAYS filter IsDeleted = 0."

  - name: INVCDESCR
    type: nvarchar(120)
    nullable: true
    description: "Invoice description for the line item."

  - name: LineQnt
    type: numeric(24,8)
    nullable: true
    description: "Order line quantity."

  - name: PRICE
    type: numeric(24,8)
    nullable: true
    description: "Unit price."

  - name: SALEPRICE
    type: numeric(24,8)
    nullable: true
    description: "Sale price per unit."

  - name: SALEAMT
    type: numeric(24,8)
    nullable: true
    description: "Total sale amount."

  - name: ICQNT
    type: float
    nullable: true
    description: "IC quantity at fill level."

  - name: ProductQnt
    type: float
    nullable: true
    description: "Product quantity at fill level."

  - name: GASETLAMT
    type: numeric(19,6)
    nullable: true
    description: "Grower settlement amount for this fill."

  - name: GABLOCKIDX
    type: int
    nullable: true
    description: "Block index for grower traceability."

  - name: GALOTIDX
    type: int
    nullable: true
    description: "Lot index. Join to VW_LP_LOTS for pool code."

  - name: POOLIDX
    type: int
    nullable: true
    description: "Pool index (CF reference)."

  - name: TAG_ID
    type: nvarchar(50)
    nullable: true
    description: "Physical tag ID string."

  - name: EQUIVFACTOR
    type: float
    nullable: true
    description: "Standard carton equivalent factor."

  - name: EQUIV_QNT
    type: float
    nullable: true
    description: "Equivalent quantity. ICQNT * EQUIVFACTOR."

  - name: FinalEquivQty
    type: float
    nullable: true
    description: "Final adjusted equivalent quantity. USE THIS for reporting."

  # Remaining columns match VW_E_SHIPMENTS exactly - see e_shipments.yaml
  - name: ARTRXHDRIDX
    type: int
    nullable: true
    description: "AR Transaction header index."
  - name: SOURCEIDX
    type: int
    nullable: true
    description: "Source index."
  - name: CUSTPOREF
    type: nvarchar(20)
    nullable: true
    description: "Customer PO reference."
  - name: HOLDFLAG
    type: varchar(1)
    nullable: true
    description: "Hold flag."
  - name: SOStatusID
    type: varchar(1)
    nullable: true
    description: "Status code."
  - name: SOTypeID
    type: varchar(1)
    nullable: true
    description: "Order type code."
  - name: SOType
    type: nvarchar(100)
    nullable: true
    description: "Order type."
  - name: SaleTerms
    type: nvarchar(100)
    nullable: true
    description: "Sale terms."
  - name: CUSTNAMEIDX
    type: int
    nullable: true
    description: "Customer name index."
  - name: TOCUSTNAMEIDX
    type: int
    nullable: true
    description: "Ship-to customer index."
  - name: TOCUSTLOCSEQ
    type: int
    nullable: true
    description: "Ship-to location sequence."
  - name: HeaderTimestamp
    type: datetime2
    nullable: true
    description: "Header timestamp."
  - name: SALESPERSONNAMEIDX
    type: int
