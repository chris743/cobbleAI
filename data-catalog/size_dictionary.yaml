        description: "40 count - large"
      - code: "048"
        description: "48 count - large"
      - code: "056"
        description: "56 count - medium-large"
      - code: "064"
        description: "64 count"
      - code: "072"
        description: "72 count - medium"
      - code: "088"
        description: "88 count - medium-small"
      - code: "113"
        description: "113 count - small"
      - code: "138"
        description: "138 count - small"
      - code: "163"
        description: "163 count - very small"

