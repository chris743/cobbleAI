# Special non-numeric size codes used across commodities
special_size_codes:
  JUICE: "Juice/processing grade - not a numeric size. Sold in bulk bins."
  CTN: "Generic carton - no size differentiation."
  X_suffix: "Import size codes (e.g., 01X, 03X). Treat as standard sizes."
  B_suffix: "Import size codes (e.g., 02B, 04B). Treat as standard sizes."
