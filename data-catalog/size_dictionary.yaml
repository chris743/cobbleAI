  MANDARIN:
    standard_carton_weight: 25
    note: |
      Mandarin sizing is based on a 5 lb carton. Multiply size code by 5 to get
      pieces per 25 lb standard carton (e.g., size 021 = 105 pieces per 25 lb).
      Import sizes (001-005, X/B suffixes) follow the same convention - treat as sizes.
      Gold Nugget mandarin sizes (MED/LRG, JUMBO/XL, 22/3 CT) are also valid sizes.
    sizes:
      # Import sizes
      - code: "001"
        description: "Import size"
      - code: "002"
        description: "Import size"
      - code: "003"
        description: "Import size"
      - code: "004"
        description: "Import size"
      - code: "005"
        description: "Import size"
      # Standard piece-count sizes (per 5 lb carton)
      - code: "009"
        description: "9 count per 5lb (45 per 25lb) - jumbo"
      - code: "012"
        description: "12 count per 5lb (60 per 25lb) - very large"
      - code: "015"
        description: "15 count per 5lb (75 per 25lb) - large"
      - code: "018"
        description: "18 count per 5lb (90 per 25lb) - medium-large"
      - code: "021"
        description: "21 count per 5lb (105 per 25lb) - medium"
      - code: "024"
        description: "24 count per 5lb (120 per 25lb) - medium-small"
      - code: "028"
        description: "28 count per 5lb (140 per 25lb) - small"
      - code: "032"
        description: "32 count per 5lb (160 per 25lb) - small"
      - code: "036"
        description: "36 count per 5lb (180 per 25lb) - very small"
      - code: "040"
        description: "40 count per 5lb (200 per 25lb) - very small"
      - code: "044"
        description: "44 count per 5lb (220 per 25lb) - very small"
      # Import sizes (X/B suffix)
      - code: "01X"
        description: "Import size"
      - code: "02B"
        description: "Import size"
      - code: "02X"
        description: "Import size"
      - code: "04B"
        description: "Import size"
      - code: "1XX"
        description: "Import size"
      # Gold Nugget mandarin sizes
      - code: "MED/LRG"
        description: "Gold Nugget mandarin size"
      - code: "JUMBO/XL"
        description: "Gold Nugget mandarin size"
      - code: "22/3 CT"
        description: "Gold Nugget mandarin size"

  MINNEOLA:
