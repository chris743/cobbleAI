# Size Dictionary by Commodity
# Zero-padded 3-digit codes = count per standard carton (smaller number = larger fruit)
# Standard carton = 40 lbs for all commodities except mandarins (25 lbs)
# JUICE = juice/processing grade (not a numeric size)
#
# Generated from VW_LPSALESORDERS (past 12 months) and VW_BININVENTORY

