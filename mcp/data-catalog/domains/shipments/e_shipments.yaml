  LineQnt: '770.00000000'
  SALEAMT: '13706.00000000'
  INVCDESCR: MANDARIN 8-3lb BAG FB 04B FANCY FB POPPIES PROD OF
  ICQNT: '60.0'
  GALOTIDX: '11536'
  EQUIVFACTOR: '0.96'
  FinalEquivQty: '57.599999999999994'
