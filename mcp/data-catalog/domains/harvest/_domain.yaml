# Harvest Planning Domain
# Database: DM01 (NOT DM03)

name: Harvest Planning
database: DM01
description: |
  Harvest planning and field operations. Covers planning which blocks to pick,
  assigning contractors (picking, hauling, forklift), scheduling dates,
  and tracking production runs through the packing process.

  All tables in this domain live on DM01, not DM03.
  Use execute_sql with database="DM01" to query these tables.

tables:
  - dbo.harvestplanentry
  - dbo.harvestcontractors
  - dbo.processproductionruns
  - dbo.VW_scoutingreport
  - dbo.TBL_COMMODITY_VARIETY_SEASONALITY

key_concepts:
  - "Harvest plans link grower blocks to contractors, rates, pools, and dates"
  - "Contractors can provide picking, trucking/hauling, and/or forklift services"
  - "Production runs track actual packing/processing after fruit is harvested"
  - "grower_block_id references GABLOCKIDX from the block master data"
  - "source_database is typically 'COBBLESTONE' for CF-origin blocks"
  - "Scouting reports capture pre-harvest fruit quality (Brix, acidity, color, size) and field conditions"
  - "Always check recent scouting data when making harvest recommendations or pick plans"
  - "Brix-to-acid ratio determines eating quality — higher ratio = sweeter. Export navels need 8:1+"
  - "Peak Size from scouting predicts what sizes will dominate packout from a block"
  - "Variety seasonality matters most for NAVELS: Early (Beck, Fisher, Fukumoto, Newhall, M7, Gillette), Mid (Washington, Atwood, TI), Late (Powell, Spring, Lane, Chislet, Autumn Gold, Barnfield)"
  - "Do NOT pick late-season navel varieties early — quality develops later in the season"
  - "Other commodities (mandarin, lemon, grapefruit, valencia) are 'All Season' — no significant variety timing swing"
