entries:
- timestamp: '2026-03-04T00:00:00'
  category: gotcha
  key: GALOTIDX
  value: Pool code string (e.g., 'C26NG01') is in GALOTIDX column, not LotID. GA prefix
    = Grower Accounting.
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: gotcha
  key: CF_LP_idx_mismatch
  value: commodityidx, groweridx, etc. are NOT the same between CF and LP systems.
    Never join CF tables to LP tables on idx columns directly.
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: gotcha
  key: lotidx_contains_pools
  value: In LP tables, lotidx usually contains POOL values for domestic fruit, not
    actual lots.
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: gotcha
  key: ReceivedQuantitiy_typo
  value: Column is misspelled as 'ReceivedQuantitiy' (extra i) in VW_BININVENTORY.
    This is from source system.
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: gotcha
  key: mandarin_carton_equivalent
  value: Mandarin bins = 37.5 cartons (25lb std), not 23.2 like other citrus (40lb
    std). The equivctns column handles this automatically.
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: column_meaning
  key: equivctns
  value: Pre-calculated carton equivalent for a bin's AvailableQuantity. Already accounts
    for partial bins and commodity-specific conversion rates.
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: column_meaning
  key: BinEquivalent
  value: In BININVSNAPSHOTS_EXT, this is the conversion RATE (cartons per bin), not
    a quantity. Multiply Quantity * BinEquivalent = ctnqty.
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: column_meaning
  key: CFCommodityIDX
  value: In LP tables, this bridges back to Cobblestone commodity. Use this when joining
    LP inventory to CF grower accounting.
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: join_pattern
  key: inventory_to_pool
  value: VW_BININVENTORY.LotIDx = VW_LP_LOTS.lotidx, then use GALOTIDX for pool code
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: join_pattern
  key: inventory_to_lp_commodity
  value: VW_BININVENTORY.CommodityIDX = VW_LP_COMMODITIES.commodityidx
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: join_pattern
  key: inventory_to_cf_commodity
  value: VW_BININVENTORY.CFCommodityIDX = VW_CF_COMMODITIES.commodityidx (cross-system
    bridge)
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: business_rule
  key: active_inventory_filter
  value: Always filter AvailableQuantity > 0 for current inventory. Bins with 0 are
    fully consumed.
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: business_rule
  key: size_interpretation
  value: Size = count per standard carton. Smaller number = bigger fruit = higher
    price. For mandarins, multiply by 5 (size is per 5lb, std carton is 25lb).
  verified: true
- timestamp: '2026-03-04T00:00:00'
  category: business_rule
  key: export_grades
  value: EXP FANCY and EXP CHOICE are export grades. They run ~half a size larger
    than labeled and have special coatings for ocean transit.
  verified: true
- timestamp: '2026-03-04T13:08:48.099069'
  category: column_meaning
  key: Size_column_format
  value: Size values need to be padded to 3 characters with leading zeros (e.g., '088'
    not '88')
  verified: false
- timestamp: '2026-03-04T13:36:37.062479'
  category: column_meaning
  key: Size_column_format
  value: Size values are stored with 3-digit format with leading zeros (e.g., '088'
    not '88')
  verified: false
- timestamp: '2026-03-04T16:45:20.550963'
  category: column_meaning
  key: Style_FB_meaning
  value: FB in style codes means "film bags" (e.g., "18-2# FB" = 18 count 2-pound
    film bags)
  verified: false
- timestamp: '2026-03-04T16:45:20.569638'
  category: column_meaning
  key: Style_format_pattern
  value: Style codes are formatted as count-weight-style (e.g., "12-3# CB" = 12 count
    3-pound consumer bags, "8-5# FB" = 8 count 5-pound film bags)
  verified: true
- timestamp: '2026-03-04T16:46:07.603736'
  category: column_meaning
  key: Style_CB_meaning
  value: CB in style codes means "combo bags" (not consumer bags as previously thought)
  verified: true
- timestamp: '2026-03-04T16:46:07.634770'
  category: column_meaning
  key: Style_NB_meaning
  value: NB in style codes means "net bags"
  verified: true
- timestamp: '2026-03-04T16:46:07.663032'
  category: column_meaning
  key: Style_WM_meaning
  value: WM in style codes means "wicketed mesh" bags
  verified: true
- timestamp: '2026-03-04T16:46:07.688222'
  category: column_meaning
  key: Style_HD_meaning
  value: HD in style codes means "header bags"
  verified: true
- timestamp: '2026-03-04T16:53:13.167077'
  category: business_rule
  key: film_bag_size_flexibility
  value: Film bag orders can flex 1 size north (larger fruit) or south (smaller fruit)
    to fill orders. This allows production flexibility when exact size inventory is
    limited.
  verified: true
- timestamp: '2026-03-04T21:07:40.059505'
  category: business_rule
  key: food_bank_orders_in_lbs
  value: 'Food bank orders: ORDERQNT is in POUNDS, not cartons. Divide by 40 to get
    carton equivalents. The TRI-WALL order of 39,156 lbs = 979 cartons, not 734,175.'
  verified: true
- timestamp: '2026-03-04T21:13:23.231271'
  category: business_rule
  key: size_ordering_citrus
  value: 'Citrus sizes: LOWER number = LARGER fruit. So 048 > 056 > 072 > 088 > 113
    > 138. Size 072 is larger fruit than 088, and 088 is larger than 113.'
  verified: true
- timestamp: '2026-03-04T21:26:49.945665'
  category: business_rule
  key: equipment_slang
  value: 'User slang terms: ''giro'' = Film Bag line, ''fox'' = Combo Bag/WM line,
    ''vex''/''vexar'' = Net Bag line'
  verified: true
- timestamp: '2026-03-05T09:21:36.556392'
  category: business_rule
  key: KRP_sample_orders
  value: Kings River Packing, LP is the company's marketing arm. Orders to KRP are
    internal sample/marketing reimbursements, not real market sales. Should exclude
    from pricing analysis and market reporting.
  verified: true
- timestamp: '2026-03-05T15:26:53.393376'
  category: business_rule
  key: juice_orders_default_filter
  value: 'Always exclude juice orders (Grade = ''JUICE'') from analysis unless user
    specifically asks for juice data. Juice orders distort volume analysis since they
    use different units (lbs vs cartons) and have massive equivalent factors. Default
    filter: AND Grade != ''JUICE'''
  verified: true
- timestamp: '2026-03-05T15:31:11.792248'
  category: business_rule
  key: navel_variety_timing
  value: 'Navel varieties by harvest timing: Early/Mid-season = Washington, Atwood,
    Chislet, Autumn Gold, Fisher, Barnfield, Gillette. Late season = Powell, Lane
    Late. Always consider variety timing when making picking recommendations.'
  verified: true
- timestamp: '2026-03-05T15:37:23.437381'
  category: business_rule
  key: pick_plan_optimization
  value: Pick plans should use base 50 bin quantities as much as possible (50, 100,
    150, 200, etc.) and avoid spreading picks across many different locations. Focus
    on fewer blocks with larger quantities rather than many small picks from different
    blocks for operational efficiency.
  verified: true
- timestamp: '2026-03-06T09:14:39.056846'
  category: business_rule
  key: labor_data_location
  value: Labor costs and workforce data are in rpt.vw_LaborSummaryDaily_Combined table
    from UKG system. Use this for any labor, payroll, headcount, or labor cost analysis
    questions. Always use _num suffix columns for calculations. Cannot filter soft-deleted
    records due to system keyword restriction.
  verified: false
- timestamp: '2026-03-06T10:55:31.853709'
  category: business_rule
  key: production_volume_timing
  value: 'For production volume questions: Use repack outputs (rpt.vw_IC_REPACKING_OutputByRun)
    for day-of/current data since product is packed but not yet shipped. Use shipment
    data (rpt.vw_Shipments_RS) for historical analysis of what actually moved out.
    Day-of production = what we''re making right now via repacks.'
  verified: false
