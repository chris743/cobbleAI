<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CobbleAI - Norman</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #FDFBF8;
            --bg-sidebar: #1E4B32;
            --bg-sidebar-hover: #276240;
            --bg-sidebar-active: #2F7A4E;
            --bg-white: #ffffff;
            --bg-user-msg: #1E4B32;
            --bg-agent-msg: #ffffff;
            --bg-input: #ffffff;
            --border-color: #e2ddd6;
            --text-primary: #1E1E1E;
            --text-secondary: #4F4F4F;
            --text-sidebar: #a8c5b3;
            --text-sidebar-active: #ffffff;
            --accent: #DA762D;
            --accent-hover: #b65f22;
            --accent-subtle: #fdf0e6;
            --danger: #ef4444;
            --sidebar-width: 280px;
            --code-bg: #1E4B32;
            --code-text: #e8f0eb;
            --table-stripe: #f9f6f2;
        }

        [data-theme="dark"] {
            --bg-primary: #1A1A1A;
            --bg-sidebar: #1A1A1A;
            --bg-sidebar-hover: #2a2a2a;
            --bg-sidebar-active: #333333;
            --bg-white: #232323;
            --bg-user-msg: #2a2a2a;
            --bg-agent-msg: #232323;
            --bg-input: #232323;
            --border-color: #3A3A3A;
            --text-primary: #F1F1F1;
            --text-secondary: #B0B0B0;
            --text-sidebar: #7C7C7C;
            --text-sidebar-active: #F1F1F1;
            --accent: #DA762D;
            --accent-hover: #b65f22;
            --accent-subtle: #3d2a1a;
            --code-bg: #1e1e1e;
            --code-text: #d4d4d4;
            --table-stripe: #2a2a2a;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: var(--text-primary);
        }

        /* ── Sidebar ── */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: margin-left 0.25s ease;
        }

        #sidebar.collapsed { margin-left: calc(var(--sidebar-width) * -1); }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .sidebar-logo {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            font-size: 16px;
            flex-shrink: 0;
        }

        .sidebar-brand {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }

        .sidebar-brand small {
            display: block;
            font-size: 11px;
            font-weight: 400;
            color: var(--text-sidebar);
            margin-top: 2px;
        }

        #new-chat-btn {
            margin: 16px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
        }

        #new-chat-btn:hover { background: rgba(255,255,255,0.14); }

        #new-chat-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
        }

        .conversation-list::-webkit-scrollbar { width: 4px; }
        .conversation-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .convo-item {
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-sidebar);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.15s, color 0.15s;
            margin-bottom: 2px;
        }

        .convo-item:hover { background: var(--bg-sidebar-hover); color: var(--text-sidebar-active); }
        .convo-item.active { background: var(--bg-sidebar-active); color: var(--text-sidebar-active); }

        /* ── Main Area ── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* Top bar */
        #topbar {
            height: 56px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
        }

        #sidebar-toggle {
            width: 34px;
            height: 34px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: background 0.15s;
        }

        #sidebar-toggle:hover { background: var(--bg-primary); }
        #sidebar-toggle svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }

        #topbar-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Chat Area ── */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
        }

        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 6px; }

        /* Welcome screen */
        #welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-avatar {
            width: 72px;
            height: 72px;
            background: var(--accent-subtle);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
        }

        #welcome h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        #welcome p {
            color: var(--text-secondary);
            font-size: 14px;
            max-width: 420px;
            line-height: 1.6;
        }

        .welcome-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 24px;
            justify-content: center;
            max-width: 600px;
        }

        .suggestion-chip {
            padding: 8px 16px;
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
        }

        .suggestion-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 1px 4px rgba(218,118,45,0.15);
        }

        /* Messages */
        #messages { display: none; }

        .message-row {
            padding: 8px 24px;
            display: flex;
            gap: 14px;
            max-width: 860px;
            margin: 0 auto;
            width: 100%;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            margin-top: 2px;
        }

        .avatar-user {
            background: var(--bg-user-msg);
            color: #fff;
        }

        .avatar-agent {
            background: var(--accent-subtle);
            color: var(--accent);
        }

        .message-content {
            flex: 1;
            min-width: 0;
            font-size: 14px;
            line-height: 1.65;
        }

        .message-sender {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .message-sender.user { color: var(--text-primary); }
        .message-sender.agent { color: var(--accent); }

        .message-body { word-wrap: break-word; }

        .message-body.error-text { color: var(--danger); }

        /* Markdown styles */
        .message-body h1, .message-body h2, .message-body h3 {
            margin: 12px 0 6px 0;
            line-height: 1.3;
        }
        .message-body h1 { font-size: 18px; }
        .message-body h2 { font-size: 16px; }
        .message-body h3 { font-size: 15px; }
        .message-body p { margin: 6px 0; }

        .message-body table {
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 13px;
            width: 100%;
            overflow-x: auto;
            display: block;
        }

        .message-body th, .message-body td {
            border: 1px solid var(--border-color);
            padding: 7px 12px;
            text-align: left;
            white-space: nowrap;
        }

        .message-body th {
            background: var(--bg-primary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--text-secondary);
        }

        .message-body tr:nth-child(even) { background: var(--table-stripe); }

        .message-body code {
            background: var(--accent-subtle);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        }

        .message-body pre {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 14px 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 13px;
        }

        .message-body pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .message-body ul, .message-body ol {
            margin: 6px 0;
            padding-left: 22px;
        }

        .message-body li { margin: 3px 0; }

        .message-body strong { font-weight: 600; }

        .message-body blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 14px;
            color: var(--text-secondary);
            margin: 8px 0;
        }

        /* Chart container */
        .chart-container {
            position: relative;
            margin: 14px 0;
            padding: 16px;
            background: var(--bg-primary);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            max-width: 600px;
        }

        .chart-container canvas { max-height: 350px; }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* Download link */
        .message-body a[href^="/download/"] {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            margin: 8px 0;
            transition: background 0.15s;
        }

        .message-body a[href^="/download/"]:hover { background: var(--accent-hover); }
        .message-body a[href^="/download/"]::before { content: "\2B07\FE0F "; }

        /* Thinking indicator */
        .thinking-row {
            padding: 8px 24px;
            display: flex;
            gap: 14px;
            max-width: 860px;
            margin: 0 auto;
            width: 100%;
        }

        .thinking-content {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            padding: 8px 0;
        }

        .dots span {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dots span:nth-child(1) { animation-delay: 0s; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── Input Area ── */
        #input-area {
            padding: 16px 24px 24px;
            flex-shrink: 0;
        }

        #input-wrapper {
            max-width: 820px;
            margin: 0 auto;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: flex-end;
            padding: 6px 6px 6px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(218,118,45,0.12);
        }

        #user-input {
            flex: 1;
            padding: 8px 0;
            border: none;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 150px;
            line-height: 1.5;
            background: transparent;
            color: var(--text-primary);
        }

        #user-input::placeholder { color: var(--text-secondary); }

        #send-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
        }

        #send-btn:hover { background: var(--accent-hover); }
        #send-btn:active { transform: scale(0.95); }
        #send-btn:disabled { background: var(--border-color); cursor: not-allowed; transform: none; }
        #send-btn svg { width: 18px; height: 18px; fill: currentColor; }

        #input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary); opacity: 0.6;
            margin-top: 8px;
            max-width: 820px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Auth overlay ── */
        #auth-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #auth-overlay .auth-brand {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        #auth-overlay .auth-sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        #auth-overlay.hidden { display: none; }

        /* ── User menu (sidebar footer) ── */
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-footer .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }

        .sidebar-footer .user-name {
            flex: 1;
            color: var(--text-sidebar);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #sign-out-btn {
            background: none;
            border: none;
            color: var(--text-sidebar);
            cursor: pointer;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
        }

        #sign-out-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* ── Theme toggle ── */
        #theme-toggle {
            width: 34px;
            height: 34px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            margin-left: auto;
            transition: background 0.15s;
            font-size: 16px;
        }

        #theme-toggle:hover { background: var(--bg-primary); }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            #sidebar { position: fixed; z-index: 100; height: 100vh; }
            #sidebar.collapsed { margin-left: calc(var(--sidebar-width) * -1); }
            .message-row, .thinking-row { padding: 8px 16px; }
            #input-area { padding: 12px 16px 16px; }
        }
    </style>
</head>
<body>
    <!-- Auth overlay (shown until Clerk loads) -->
    <div id="auth-overlay">
        <div class="auth-brand">Norman</div>
        <div class="auth-sub">Sign in to access CobbleAI</div>
        <div id="clerk-sign-in"></div>
    </div>

    <!-- App (hidden until authenticated) -->
    <div id="app" style="display:none; flex:1; height:100vh; overflow:hidden;">

    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">N</div>
            <div class="sidebar-brand">
                Norman
                <small>Powered by Cobblestone Fruit Company</small>
            </div>
        </div>
        <button id="new-chat-btn">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Conversation
        </button>
        <div class="conversation-list" id="convo-list"></div>
        <div class="sidebar-footer" id="sidebar-footer" style="display:none">
            <img class="user-avatar" id="user-avatar" src="" alt="">
            <span class="user-name" id="user-name"></span>
            <button id="sign-out-btn">Sign out</button>
        </div>
    </aside>

    <!-- Main -->
    <div id="main">
        <div id="topbar">
            <button id="sidebar-toggle">
                <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span id="topbar-title">New Conversation</span>
            <button id="theme-toggle" title="Toggle dark mode">
                <span id="theme-icon">&#9790;</span>
            </button>
        </div>

        <div id="chat-container">
            <!-- Welcome screen -->
            <div id="welcome">
                <div class="welcome-avatar">N</div>
                <h2>Hello, I'm Norman</h2>
                <p>Your data warehouse assistant for citrus operations. I can help with inventory, sales, production, harvest planning, and more.</p>
                <div class="welcome-suggestions">
                    <button class="suggestion-chip" data-q="What's our current bin inventory by commodity?">Bin inventory by commodity</button>
                    <button class="suggestion-chip" data-q="Show me today's packing production summary">Today's production</button>
                    <button class="suggestion-chip" data-q="What are the open sales orders this week?">Open sales orders</button>
                    <button class="suggestion-chip" data-q="How many bins did we receive yesterday?">Yesterday's receivings</button>
                </div>
            </div>

            <!-- Messages (shown when conversation active) -->
            <div id="messages"></div>
        </div>

        <div id="input-area">
            <div id="input-wrapper">
                <textarea id="user-input" placeholder="Ask Norman anything about your operations..." rows="1"></textarea>
                <button id="send-btn" title="Send message">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <div id="input-hint">Press Enter to send, Shift+Enter for a new line</div>
        </div>
    </div>

    </div><!-- /app -->

    <!-- Clerk JS -->
    <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script>
        // ── DOM refs ──
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const convoList = document.getElementById('convo-list');
        const chatContainer = document.getElementById('chat-container');
        const welcome = document.getElementById('welcome');
        const messagesEl = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const newChatBtn = document.getElementById('new-chat-btn');
        const topbarTitle = document.getElementById('topbar-title');

        let conversationId = null;
        let isWaiting = false;

        // ── Marked config ──
        marked.setOptions({ gfm: true, breaks: true });

        // ── Sidebar toggle ──
        sidebarToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));

        // ── Helpers ──
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showMessages() {
            welcome.style.display = 'none';
            messagesEl.style.display = 'block';
        }

        // ── Chart rendering ──
        const CHART_PALETTE = [
            'rgba(30, 75, 50, 0.75)',
            'rgba(218, 118, 45, 0.75)',
            'rgba(16, 185, 129, 0.7)',
            'rgba(245, 158, 11, 0.7)',
            'rgba(59, 130, 246, 0.7)',
            'rgba(139, 92, 246, 0.7)',
            'rgba(6, 182, 212, 0.7)',
            'rgba(156, 163, 175, 0.7)'
        ];
        const CHART_BORDERS = CHART_PALETTE.map(c => c.replace('0.7)', '1)'));

        function renderCharts(container) {
            const codeBlocks = container.querySelectorAll('code.language-chart');
            codeBlocks.forEach(code => {
                const pre = code.parentElement;
                try {
                    const spec = JSON.parse(code.textContent);
                    const wrapper = document.createElement('div');
                    wrapper.className = 'chart-container';

                    if (spec.title) {
                        const title = document.createElement('div');
                        title.className = 'chart-title';
                        title.textContent = spec.title;
                        wrapper.appendChild(title);
                    }

                    const canvas = document.createElement('canvas');
                    wrapper.appendChild(canvas);
                    pre.replaceWith(wrapper);

                    let chartType = spec.type === 'horizontalBar' ? 'bar' : spec.type;
                    const datasets = (spec.datasets || []).map((ds, i) => ({
                        label: ds.label || `Series ${i + 1}`,
                        data: ds.data,
                        backgroundColor: ds.backgroundColor || (
                            ['pie', 'doughnut'].includes(chartType)
                                ? CHART_PALETTE.slice(0, ds.data.length)
                                : CHART_PALETTE[i % CHART_PALETTE.length]
                        ),
                        borderColor: ds.borderColor || (
                            ['pie', 'doughnut'].includes(chartType)
                                ? CHART_BORDERS.slice(0, ds.data.length)
                                : CHART_BORDERS[i % CHART_BORDERS.length]
                        ),
                        borderWidth: ds.borderWidth || (chartType === 'line' ? 2 : 1),
                        tension: chartType === 'line' ? 0.3 : undefined,
                        fill: chartType === 'line' ? false : undefined
                    }));

                    const indexAxis = spec.indexAxis || (spec.type === 'horizontalBar' ? 'y' : undefined);

                    new Chart(canvas, {
                        type: chartType,
                        data: { labels: spec.labels || [], datasets },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            indexAxis: indexAxis,
                            plugins: {
                                legend: { display: datasets.length > 1 || ['pie','doughnut'].includes(chartType) },
                                title: { display: false }
                            },
                            scales: ['pie','doughnut'].includes(chartType) ? {} : {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                } catch (e) {
                    console.warn('Chart render failed:', e);
                }
            });
        }

        // ── Message rendering ──
        function addMessage(text, role) {
            showMessages();

            const row = document.createElement('div');
            row.className = 'message-row';

            const avatar = document.createElement('div');
            avatar.className = `message-avatar avatar-${role}`;
            avatar.textContent = role === 'agent' ? 'N' : 'You';

            const content = document.createElement('div');
            content.className = 'message-content';

            const sender = document.createElement('div');
            sender.className = `message-sender ${role}`;
            sender.textContent = role === 'agent' ? 'Norman' : 'You';

            const body = document.createElement('div');
            body.className = 'message-body';

            if (role === 'agent') {
                body.innerHTML = marked.parse(text);
                renderCharts(body);
            } else if (role === 'error') {
                body.classList.add('error-text');
                body.textContent = text;
                sender.textContent = 'Error';
            } else {
                body.textContent = text;
            }

            content.appendChild(sender);
            content.appendChild(body);
            row.appendChild(avatar);
            row.appendChild(content);
            messagesEl.appendChild(row);
            scrollToBottom();
            return row;
        }

        function showThinking() {
            showMessages();
            const row = document.createElement('div');
            row.className = 'thinking-row';
            row.id = 'thinking-indicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar avatar-agent';
            avatar.textContent = 'N';

            const content = document.createElement('div');
            content.className = 'thinking-content';
            content.innerHTML = 'Norman is thinking <span class="dots"><span></span><span></span><span></span></span>';

            row.appendChild(avatar);
            row.appendChild(content);
            messagesEl.appendChild(row);
            scrollToBottom();
        }

        function hideThinking() {
            const el = document.getElementById('thinking-indicator');
            if (el) el.remove();
        }

        // ── Auth helper ──
        async function authHeaders() {
            const token = await window.__clerk?.session?.getToken();
            return {
                'Content-Type': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            };
        }

        async function authFetch(url, options = {}) {
            const headers = await authHeaders();
            return fetch(url, { ...options, headers: { ...headers, ...options.headers } });
        }

        // ── Conversation sidebar ──
        function updateSidebar() {
            authFetch('/conversations')
                .then(r => r.json())
                .then(convos => {
                    convoList.innerHTML = '';
                    convos.forEach(c => {
                        const item = document.createElement('div');
                        item.className = 'convo-item' + (c.id === conversationId ? ' active' : '');
                        item.textContent = c.title;
                        item.addEventListener('click', () => loadConversation(c.id));
                        convoList.appendChild(item);
                    });
                });
        }

        function loadConversation(id) {
            authFetch(`/conversations/${id}`)
                .then(r => r.json())
                .then(convo => {
                    conversationId = convo.id;
                    topbarTitle.textContent = convo.title;
                    messagesEl.innerHTML = '';
                    showMessages();
                    convo.messages.forEach(msg => {
                        const role = msg.role === 'assistant' ? 'agent' : msg.role;
                        addMessage(msg.content, role);
                    });
                    updateSidebar();
                });
        }

        // ── Send message ──
        async function sendMessage(text) {
            text = text || userInput.value.trim();
            if (!text || isWaiting) return;

            addMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            isWaiting = true;
            sendBtn.disabled = true;
            showThinking();

            // Update title if new conversation
            if (!conversationId) {
                topbarTitle.textContent = text.substring(0, 60);
            }

            try {
                const res = await authFetch('/chat', {
                    method: 'POST',
                    body: JSON.stringify({ message: text, conversation_id: conversationId })
                });

                const data = await res.json();
                hideThinking();

                if (res.ok) {
                    conversationId = data.conversation_id;
                    addMessage(data.response, 'agent');
                    updateSidebar();
                } else {
                    addMessage(data.error || 'Something went wrong', 'error');
                }
            } catch (err) {
                hideThinking();
                addMessage(`Connection error: ${err.message}`, 'error');
            }

            isWaiting = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // ── Event listeners ──
        sendBtn.addEventListener('click', () => sendMessage());

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
        });

        newChatBtn.addEventListener('click', () => {
            conversationId = null;
            messagesEl.innerHTML = '';
            messagesEl.style.display = 'none';
            welcome.style.display = 'flex';
            topbarTitle.textContent = 'New Conversation';
            updateSidebar();
            userInput.focus();
        });

        // Suggestion chips
        document.querySelectorAll('.suggestion-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const q = chip.getAttribute('data-q');
                sendMessage(q);
            });
        });

        // ── Theme toggle ──
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        function setTheme(dark) {
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
            themeIcon.innerHTML = dark ? '&#9788;' : '&#9790;';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }

        // Init theme from storage or system preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            setTheme(true);
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            setTheme(!isDark);
        });

        // ── Clerk init ──
        const authOverlay = document.getElementById('auth-overlay');
        const sidebarFooter = document.getElementById('sidebar-footer');
        const userAvatar = document.getElementById('user-avatar');
        const userName = document.getElementById('user-name');
        const signOutBtn = document.getElementById('sign-out-btn');

        const appEl = document.getElementById('app');
        async function initClerk() {
            // Wait for Clerk JS to be available
            while (!window.Clerk) {
                await new Promise(r => setTimeout(r, 50));
            }
            const clerk = new window.Clerk('{{ clerk_publishable_key }}');
            window.__clerk = clerk;
            await clerk.load();

            if (!clerk.user) {
                authOverlay.style.display = 'flex';
                clerk.mountSignIn(document.getElementById('clerk-sign-in'));

                clerk.addListener(({ user }) => {
                    if (user) {
                        authOverlay.style.display = 'none';
                        showApp(user);
                    }
                });
            } else {
                authOverlay.style.display = 'none';
                showApp(clerk.user);
            }
        }

        function showApp(user) {
            // Show the main app
            appEl.style.display = 'flex';

            // Show user info in sidebar
            userAvatar.src = user.imageUrl;
            userName.textContent = user.firstName || user.emailAddresses?.[0]?.emailAddress || 'User';
            sidebarFooter.style.display = 'flex';

            // Load conversations and focus input
            updateSidebar();
            userInput.focus();
        }

        signOutBtn.addEventListener('click', async () => {
            await window.__clerk.signOut();
            window.location.reload();
        });

        initClerk();
    </script>
</body>
</html>
