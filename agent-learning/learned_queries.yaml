- timestamp: '2026-03-04T14:25:59.946846'
  question: How many navels do I have on orders shipping today?
  sql: "SELECT \n    SUM(ORDERQNT) as TotalUnits,\n    SUM(equivqnt) as TotalStdCartons,\n\
    \    COUNT(*) as NumberOfOrderLines,\n    COUNT(DISTINCT CustomerName) as UniqueCustomers\n\
    FROM dbo.VW_LPSALESORDERS\nWHERE Commodity = 'NAVEL'\n  AND CAST(SHIPDATETIME\
    \ as DATE) = CAST(GETDATE() as DATE)\n  AND ORDERQNT > 0"
  notes: Use SHIPDATETIME for shipping date filter and equivqnt for standardized volume.
    Filter ORDERQNT > 0 to exclude canceled/zero lines.
  verified: true
- timestamp: '2026-03-04T14:30:20.089941'
  question: per size and grade of navels do i have enough inventory to cover the orders
    shipping today?
  sql: "WITH TodaysOrders AS (\n    SELECT \n        SizeName,\n        Grade,\n \
    \       SUM(ORDERQNT) as TotalUnitsOrdered,\n        SUM(equivqnt) as TotalStdCartonsOrdered,\n\
    \        COUNT(DISTINCT CustomerName) as CustomerCount,\n        COUNT(*) as OrderLines\n\
    \    FROM dbo.VW_LPSALESORDERS\n    WHERE Commodity = 'NAVEL'\n      AND CAST(SHIPDATETIME\
    \ as DATE) = CAST(GETDATE() as DATE)\n      AND ORDERQNT > 0\n    GROUP BY SizeName,\
    \ Grade\n),\nInventoryAvailable AS (\n    SELECT \n        Size,\n        Grade,\n\
    \        SUM(AvailableQuantity) as TotalBins,\n        SUM(equivctns) as TotalStdCartonsAvailable\n\
    \    FROM dbo.VW_BININVENTORY\n    WHERE Commodity = 'NAVEL'\n      AND AvailableQuantity\
    \ > 0\n    GROUP BY Size, Grade\n)\nSELECT \n    COALESCE(o.SizeName, i.Size)\
    \ as Size,\n    COALESCE(o.Grade, i.Grade) as Grade,\n    ISNULL(o.TotalStdCartonsOrdered,\
    \ 0) as OrderedStdCartons,\n    ISNULL(i.TotalStdCartonsAvailable, 0) as AvailableStdCartons,\n\
    \    ISNULL(i.TotalStdCartonsAvailable, 0) - ISNULL(o.TotalStdCartonsOrdered,\
    \ 0) as NetPosition,\n    CASE \n        WHEN ISNULL(o.TotalStdCartonsOrdered,\
    \ 0) = 0 THEN 'No orders'\n        WHEN ISNULL(i.TotalStdCartonsAvailable, 0)\
    \ >= ISNULL(o.TotalStdCartonsOrdered, 0) THEN 'SUFFICIENT'\n        ELSE 'SHORT'\n\
    \    END as Status,\n    o.CustomerCount,\n    o.OrderLines,\n    i.TotalBins\
    \ as BinsAvailable\nFROM TodaysOrders o\n    FULL OUTER JOIN InventoryAvailable\
    \ i ON o.SizeName = i.Size AND o.Grade = i.Grade\nORDER BY \n    CASE WHEN ISNULL(i.TotalStdCartonsAvailable,\
    \ 0) < ISNULL(o.TotalStdCartonsOrdered, 0) THEN 0 ELSE 1 END,\n    Size, Grade"
  notes: Compares today's navel orders by size/grade to available inventory. Uses
    FULL OUTER JOIN to show both shortages and surplus inventory. Orders results with
    shortages first.
  verified: false
- timestamp: '2026-03-04T14:43:31.875092'
  question: Do I have enough inventory to cover unfulfilled orders shipping today
    by size and grade?
  sql: "WITH UnfulfilledOrders AS (\n    SELECT \n        SizeName,\n        Grade,\n\
    \        SUM(ORDERQNT - RESERVEQNT) as UnfulfilledQty,\n        SUM((ORDERQNT\
    \ - RESERVEQNT) * EQUIVFACTOR) as UnfulfilledEquivCtns,\n        COUNT(*) as OrderLineCount\n\
    \    FROM dbo.VW_LPSALESORDERS\n    WHERE Commodity = 'NAVEL'\n      AND CAST(SHIPDATETIME\
    \ AS DATE) = CAST(GETDATE() AS DATE)\n      AND ORDERQNT > RESERVEQNT\n      AND\
    \ ORDERQNT > 0\n    GROUP BY SizeName, Grade\n),\nCurrentInventory AS (\n    SELECT\
    \ \n        Size,\n        Grade,\n        SUM(AvailableQuantity) as TotalBins,\n\
    \        SUM(equivctns) as TotalEquivCtns\n    FROM dbo.VW_BININVENTORY\n    WHERE\
    \ Commodity = 'NAVEL'\n      AND AvailableQuantity > 0\n    GROUP BY Size, Grade\n\
    )\nSELECT \n    COALESCE(u.SizeName, i.Size) as Size,\n    COALESCE(u.Grade, i.Grade)\
    \ as Grade,\n    ISNULL(u.UnfulfilledQty, 0) as UnfulfilledOrderQty,\n    ISNULL(u.UnfulfilledEquivCtns,\
    \ 0) as UnfulfilledEquivCtns,\n    ISNULL(u.OrderLineCount, 0) as UnfulfilledOrderLines,\n\
    \    ISNULL(i.TotalBins, 0) as AvailableBins,\n    ISNULL(i.TotalEquivCtns, 0)\
    \ as AvailableEquivCtns,\n    CASE \n        WHEN ISNULL(i.TotalEquivCtns, 0)\
    \ >= ISNULL(u.UnfulfilledEquivCtns, 0) \n        THEN 'SUFFICIENT' \n        ELSE\
    \ 'SHORTAGE'\n    END as InventoryStatus,\n    ISNULL(i.TotalEquivCtns, 0) - ISNULL(u.UnfulfilledEquivCtns,\
    \ 0) as SurplusOrShortage\nFROM UnfulfilledOrders u\nFULL OUTER JOIN CurrentInventory\
    \ i ON u.SizeName = i.Size AND u.Grade = i.Grade\nWHERE ISNULL(u.UnfulfilledQty,\
    \ 0) > 0 OR ISNULL(i.TotalBins, 0) > 0\nORDER BY \n    CASE WHEN ISNULL(u.UnfulfilledQty,\
    \ 0) > 0 THEN 1 ELSE 2 END,\n    Size, Grade"
  notes: Compares unfulfilled orders (ORDERQNT > RESERVEQNT) shipping today against
    current bin inventory by size/grade. Uses EQUIVFACTOR to normalize different pack
    styles to standard cartons.
  verified: false
- timestamp: '2026-03-04T14:50:55.319003'
  question: Analyze commodity shortages for the week and calculate bins needed using
    14-day packout averages
  sql: "WITH WeeklyShortages AS (\n    SELECT \n        o.Commodity,\n        o.SizeName,\n\
    \        o.Grade,\n        ISNULL(o.UnfulfilledEquivCtns, 0) - ISNULL(i.TotalEquivCtns,\
    \ 0) as ShortageEquivCtns\n    FROM (\n        SELECT \n            Commodity,\n\
    \            SizeName,\n            Grade,\n            SUM(equivqnt - (RESERVEQNT\
    \ * EQUIVFACTOR)) as UnfulfilledEquivCtns\n        FROM dbo.VW_LPSALESORDERS\n\
    \        WHERE SHIPDATETIME >= CAST(GETDATE() AS DATE)\n          AND SHIPDATETIME\
    \ < DATEADD(day, 7, CAST(GETDATE() AS DATE))\n          AND ORDERQNT > RESERVEQNT\n\
    \          AND ORDERQNT > 0\n          AND Commodity IS NOT NULL\n        GROUP\
    \ BY Commodity, SizeName, Grade\n    ) o\n    LEFT JOIN (\n        SELECT \n \
    \           Commodity,\n            Size,\n            Grade,\n            SUM(equivctns)\
    \ as TotalEquivCtns\n        FROM dbo.VW_BININVENTORY\n        WHERE AvailableQuantity\
    \ > 0\n        GROUP BY Commodity, Size, Grade\n    ) i ON o.Commodity = i.Commodity\
    \ AND o.SizeName = i.Size AND o.Grade = i.Grade\n    WHERE ISNULL(o.UnfulfilledEquivCtns,\
    \ 0) > ISNULL(i.TotalEquivCtns, 0)\n),\nPackoutPercentages AS (\n    SELECT \n\
    \        Commodity,\n        SizeName,\n        Grade,\n        pct_of_commodity\n\
    \    FROM dbo.VW_14DAYAVGPACKOUT\n    WHERE pct_of_commodity > 0\n),\nBinCalculations\
    \ AS (\n    SELECT \n        s.Commodity,\n        s.SizeName,\n        s.Grade,\n\
    \        s.ShortageEquivCtns,\n        p.pct_of_commodity,\n        CASE \n  \
    \          WHEN p.pct_of_commodity > 0 \n            THEN CEILING((s.ShortageEquivCtns\
    \ / p.pct_of_commodity) / 23.2)\n            ELSE NULL \n        END as BinsNeeded\n\
    \    FROM WeeklyShortages s\n    LEFT JOIN PackoutPercentages p ON s.Commodity\
    \ = p.Commodity \n                                   AND s.SizeName = p.SizeName\
    \ \n                                   AND s.Grade = p.Grade\n)\nSELECT \n   \
    \ Commodity,\n    COUNT(*) as ShortageItems,\n    SUM(CAST(ShortageEquivCtns as\
    \ decimal(18,2))) as TotalShortageCartons,\n    SUM(CASE WHEN BinsNeeded IS NOT\
    \ NULL THEN BinsNeeded ELSE 0 END) as TotalBinsNeeded,\n    COUNT(CASE WHEN BinsNeeded\
    \ IS NULL THEN 1 END) as ItemsWithNoPackoutData\nFROM BinCalculations\nGROUP BY\
    \ Commodity\nORDER BY TotalBinsNeeded DESC"
  notes: 'Compares unfulfilled weekly orders vs current inventory by commodity/size/grade.
    Uses 14-day average packout percentages to calculate how many bins need to be
    picked to cover shortages. Formula: shortage_cartons / packout_percentage / 23.2_cartons_per_bin'
  verified: false
- timestamp: '2026-03-04T15:06:00.837862'
  question: Weekly commodity shortage analysis with picking requirements using 14-day
    packout averages, excluding juice grade
  sql: "WITH WeeklyShortages AS (\n    SELECT \n        o.Commodity,\n        o.SizeName,\n\
    \        o.Grade,\n        ISNULL(o.UnfulfilledEquivCtns, 0) - ISNULL(i.TotalEquivCtns,\
    \ 0) as ShortageEquivCtns\n    FROM (\n        SELECT \n            Commodity,\n\
    \            SizeName,\n            Grade,\n            SUM(equivqnt - (RESERVEQNT\
    \ * EQUIVFACTOR)) as UnfulfilledEquivCtns\n        FROM dbo.VW_LPSALESORDERS\n\
    \        WHERE SHIPDATETIME >= CAST(GETDATE() AS DATE)\n          AND SHIPDATETIME\
    \ < DATEADD(day, 7, CAST(GETDATE() AS DATE))\n          AND ORDERQNT > RESERVEQNT\n\
    \          AND ORDERQNT > 0\n          AND Commodity IS NOT NULL\n          AND\
    \ Grade != 'JUICE'\n        GROUP BY Commodity, SizeName, Grade\n    ) o\n   \
    \ LEFT JOIN (\n        SELECT \n            Commodity,\n            Size,\n  \
    \          Grade,\n            SUM(equivctns) as TotalEquivCtns\n        FROM\
    \ dbo.VW_BININVENTORY\n        WHERE AvailableQuantity > 0\n          AND Grade\
    \ != 'JUICE'\n        GROUP BY Commodity, Size, Grade\n    ) i ON o.Commodity\
    \ = i.Commodity AND o.SizeName = i.Size AND o.Grade = i.Grade\n    WHERE ISNULL(o.UnfulfilledEquivCtns,\
    \ 0) > ISNULL(i.TotalEquivCtns, 0)\n),\nPackoutPercentages AS (\n    SELECT \n\
    \        Commodity,\n        SizeName,\n        Grade,\n        pct_of_commodity\n\
    \    FROM dbo.VW_14DAYAVGPACKOUT\n    WHERE pct_of_commodity > 0\n      AND Grade\
    \ != 'JUICE'\n),\nBinCalculations AS (\n    SELECT \n        s.Commodity,\n  \
    \      s.SizeName,\n        s.Grade,\n        s.ShortageEquivCtns,\n        p.pct_of_commodity,\n\
    \        CASE \n            WHEN p.pct_of_commodity > 0 \n            THEN CEILING((s.ShortageEquivCtns\
    \ / p.pct_of_commodity) / 23.2)\n            ELSE NULL \n        END as BinsNeeded\n\
    \    FROM WeeklyShortages s\n    LEFT JOIN PackoutPercentages p ON s.Commodity\
    \ = p.Commodity \n                                   AND s.SizeName = p.SizeName\
    \ \n                                   AND s.Grade = p.Grade\n)\nSELECT \n   \
    \ Commodity,\n    COUNT(*) as ShortageItems,\n    CAST(SUM(ShortageEquivCtns)\
    \ as decimal(18,1)) as TotalShortageCartons,\n    SUM(CASE WHEN BinsNeeded IS\
    \ NOT NULL THEN BinsNeeded ELSE 0 END) as TotalBinsNeeded,\n    COUNT(CASE WHEN\
    \ BinsNeeded IS NULL THEN 1 END) as ItemsWithNoPackoutData\nFROM BinCalculations\n\
    GROUP BY Commodity\nHAVING SUM(CASE WHEN BinsNeeded IS NOT NULL THEN BinsNeeded\
    \ ELSE 0 END) > 0\n   OR COUNT(CASE WHEN BinsNeeded IS NULL THEN 1 END) > 0\n\
    ORDER BY TotalBinsNeeded DESC"
  notes: Compares unfulfilled orders for the next 7 days against current inventory,
    calculates shortage in cartons, then uses 14-day average packout percentages to
    determine bins needed to pick. Excludes juice grade. Items without packout data
    show 0 bins needed but are counted separately.
  verified: false
- timestamp: '2026-03-04T15:20:59.996585'
  question: How many lemons are shipping today
  sql: "SELECT \n    SUM(ORDERQNT) as TotalUnits,\n    SUM(equivqnt) as TotalStdCartons,\n\
    \    COUNT(*) as NumberOfOrderLines,\n    COUNT(DISTINCT CustomerName) as UniqueCustomers\n\
    FROM dbo.VW_LPSALESORDERS\nWHERE Commodity = 'LEMON'\n  AND CAST(SHIPDATETIME\
    \ as DATE) = CAST(GETDATE() as DATE)\n  AND ORDERQNT > 0"
