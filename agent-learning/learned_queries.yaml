    \ 0) as AvgEffectiveRate\nFROM rpt.vw_LaborSummaryDaily_Combined\nWHERE [Counter\
    \ Date] >= DATEADD(day, -7, CAST(GETDATE() AS DATE))\n  AND [Counter Date] < CAST(GETDATE()\
    \ AS DATE)\nGROUP BY [Counter Date]\nORDER BY [Counter Date] DESC\n\n-- Department\
    \ breakdown\nSELECT\n  [Cost Centers(2)] as Department,\n  COUNT(DISTINCT [Employee\
    \ Id]) as Headcount,\n  SUM([Total Hours_num]) as TotalHours,\n  SUM([Regular\
    \ Pay_num]) as RegularPay,\n  SUM([Overtime Pay_num] + [Weekly Overtime Pay_num]\
    \ + [Double Time Pay_num]) as OvertimePay,\n  SUM([Total Pay_num]) as TotalPay,\n\
    \  SUM([Total Pay_num]) / NULLIF(SUM([Total Hours_num]), 0) as AvgEffectiveRate\n\
