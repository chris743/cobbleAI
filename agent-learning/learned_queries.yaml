entries:
- timestamp: '2026-03-04T00:00:00'
  question: Current inventory by commodity, size, grade
  sql: "SELECT \n  Commodity,\n  Size,\n  Grade,\n  SUM(AvailableQuantity) as TotalBins,\n\
    \  SUM(equivctns) as TotalCartonEquiv\nFROM dbo.VW_BININVENTORY\nWHERE AvailableQuantity\
    \ > 0\nGROUP BY Commodity, Size, Grade\nORDER BY Commodity, Size, Grade\n"
  notes: Use equivctns for carton equivalent - it's pre-calculated and handles partial
    bins
  verified: true
- timestamp: '2026-03-04T00:00:00'
  question: Inventory by pool
  sql: "SELECT \n  l.GALOTIDX as PoolCode,\n  i.Commodity,\n  SUM(i.AvailableQuantity)\
    \ as TotalBins,\n  SUM(i.equivctns) as TotalCartonEquiv\nFROM dbo.VW_BININVENTORY\
    \ i\nJOIN dbo.VW_LP_LOTS l ON i.LotIDx = l.lotidx\nWHERE i.AvailableQuantity >\
    \ 0\nGROUP BY l.GALOTIDX, i.Commodity\n"
  notes: Pool code is in GALOTIDX (Grower Accounting Lot ID), not LotID
  verified: true
- timestamp: '2026-03-04T00:00:00'
  question: Inventory trend over time
  sql: "SELECT \n  SnapshotDate,\n  Commodity,\n  SUM(Quantity) as TotalBins,\n  SUM(ctnqty)\
    \ as TotalCartons\nFROM dbo.BININVSNAPSHOTS_EXT\nWHERE SnapshotDate >= DATEADD(day,\
    \ -30, GETDATE())\nGROUP BY SnapshotDate, Commodity\nORDER BY SnapshotDate, Commodity\n"
  notes: Use BININVSNAPSHOTS_EXT for historical data, not VW_BININVENTORY
  verified: true
- timestamp: '2026-03-04T11:56:07.892597'
  question: How many bins of specific size/grade navels are in inventory
  sql: "SELECT \n    Size, Grade,\n    SUM(AvailableQuantity) as TotalBins,\n    SUM(equivctns)\
    \ as TotalCartonEquiv\nFROM dbo.VW_BININVENTORY\nWHERE AvailableQuantity > 0\n\
    \  AND Commodity = 'NAVEL'\n  AND Size = '88'\n  AND Grade = 'FANCY'\nGROUP BY\
    \ Size, Grade"
  notes: Standard inventory query pattern. Always filter AvailableQuantity > 0 for
    active inventory. Use equivctns for carton equivalents (pre-calculated). Size
    is just the number as string.
  verified: false
