- timestamp: '2026-03-05T09:24:44.159521'
  question: break down estimated remaining bins by commodity from blocks
  sql: "WITH block_estimates AS (\n    SELECT \n        c.Commodity as CommodityName,\n\
    \        b.GrowerName,\n        b.ID as BlockID,\n        b.NAME as BlockName,\n\
    \        b.ACRES,\n        ISNULL(b.ESTIMATEDBINS, 0) as EstimatedBins\n    FROM\
    \ dbo.VW_BLOCKS b\n    LEFT JOIN dbo.VW_CF_COMMODITIES c ON b.CMTYIDX = c.CommodityIDx\n\
    \    WHERE b.INACTIVEFLAG = 'N'\n        AND b.ESTIMATEDBINS > 0\n),\nbins_received\
    \ AS (\n    SELECT \n        br.Commodity as CommodityName,\n        bl.GrowerName,\n\
    \        bl.ID as BlockID,\n        SUM(ISNULL(br.RecvQnt, 0)) as BinsReceived\n\
    \    FROM dbo.VW_BINSRECEIVED br\n    JOIN dbo.VW_BLOCKS bl ON br.GablockIdx =\
    \ bl.GABLOCKIDX\n    GROUP BY br.Commodity, bl.GrowerName, bl.ID\n),\ncombined\
    \ AS (\n    SELECT \n        be.CommodityName,\n        be.GrowerName,\n     \
    \   be.BlockID,\n        be.BlockName,\n        be.ACRES,\n        be.EstimatedBins,\n\
    \        ISNULL(br.BinsReceived, 0) as BinsReceived,\n        be.EstimatedBins\
    \ - ISNULL(br.BinsReceived, 0) as RemainingBins\n    FROM block_estimates be\n\
    \    LEFT JOIN bins_received br ON be.CommodityName = br.CommodityName \n    \
    \    AND be.GrowerName = br.GrowerName \n        AND be.BlockID = br.BlockID\n\
    )\nSELECT \n    CommodityName,\n    COUNT(*) as BlockCount,\n    SUM(ACRES) as\
    \ TotalAcres,\n    SUM(EstimatedBins) as TotalEstimatedBins,\n    SUM(BinsReceived)\
    \ as TotalBinsReceived,\n    SUM(RemainingBins) as TotalRemainingBins,\n    ROUND(\n\
    \        CASE \n            WHEN SUM(EstimatedBins) > 0 \n            THEN (SUM(BinsReceived)\
    \ * 100.0 / SUM(EstimatedBins))\n            ELSE 0 \n        END, 1\n    ) as\
    \ PercentHarvested\nFROM combined\nGROUP BY CommodityName\nHAVING SUM(EstimatedBins)\
    \ > 0\nORDER BY TotalRemainingBins DESC"
  notes: Compares block estimates (VW_BLOCKS) vs actual receiving (VW_BINSRECEIVED)
    to calculate remaining bins by commodity. Uses Cobblestone CF tables only.
  verified: true
- timestamp: '2026-03-05T09:33:23.956239'
  question: How many bins need to be picked by commodity to meet open orders?
  sql: "WITH demand AS (\n    SELECT \n        Commodity,\n        SizeName as Size,\n\
    \        Grade,\n        SUM(equivqnt) as DemandCartons\n    FROM dbo.VW_LPSALESORDERS\n\
    \    WHERE CAST(SHIPDATETIME AS DATE) >= CAST(GETDATE() AS DATE)\n      AND SOStatus\
    \ IN ('Order', 'Open')\n      AND ORDERQNT > 0\n      AND Commodity IS NOT NULL\n\
    \    GROUP BY Commodity, SizeName, Grade\n),\ninventory AS (\n    SELECT \n  \
    \      Commodity,\n        Size,\n        Grade,\n        SUM(AvailableQuantity)\
    \ as AvailableBins,\n        SUM(equivctns) as AvailableCartons\n    FROM dbo.VW_BININVENTORY\n\
    \    WHERE AvailableQuantity > 0\n    GROUP BY Commodity, Size, Grade\n),\npackout\
    \ AS (\n    SELECT \n        Commodity,\n        SizeName as Size,\n        Grade,\n\
    \        pct_of_commodity as PackoutPct\n    FROM dbo.VW_14DAYAVGPACKOUT\n   \
    \ WHERE pct_of_commodity > 0\n),\nshortfalls AS (\n    SELECT \n        d.Commodity,\n\
    \        d.Size,\n        d.Grade,\n        d.DemandCartons,\n        COALESCE(i.AvailableCartons,\
    \ 0) as AvailableCartons,\n        d.DemandCartons - COALESCE(i.AvailableCartons,\
    \ 0) as ShortageCartons,\n        COALESCE(p.PackoutPct, 0.03) as PackoutPct\n\
    \    FROM demand d\n    LEFT JOIN inventory i ON d.Commodity = i.Commodity \n\
    \                          AND d.Size = i.Size \n                          AND\
    \ d.Grade = i.Grade\n    LEFT JOIN packout p ON d.Commodity = p.Commodity \n \
    \                       AND d.Size = p.Size \n                        AND d.Grade\
    \ = p.Grade\n    WHERE d.DemandCartons - COALESCE(i.AvailableCartons, 0) > 0\n\
    )\nSELECT \n    Commodity,\n    SUM(ShortageCartons) as TotalShortageCartons,\n\
    \    SUM(CASE WHEN Commodity = 'MANDARIN' THEN \n        CEILING(ShortageCartons\
    \ / PackoutPct / 37.5)\n        ELSE \n        CEILING(ShortageCartons / PackoutPct\
    \ / 23.2)\n        END) as BinsNeededToPick\nFROM shortfalls\nWHERE PackoutPct\
    \ > 0\nGROUP BY Commodity\nORDER BY BinsNeededToPick DESC"
  notes: Calculates bins needed to pick by comparing open order demand against available
    inventory, accounting for packout percentages and commodity-specific bin conversion
    rates (37.5 for mandarins, 23.2 for others)
  verified: true
