- timestamp: '2026-03-09T11:49:59.853297'
  question: Generate comprehensive production schedule with capacity analysis and
    equipment line classification
  sql: "-- Production schedule summary with capacity analysis\nWITH OrderSummary AS\
    \ (\n  SELECT \n    CASE\n      WHEN Style LIKE '%FB%' THEN 'Film Bag'\n     \
    \ WHEN Style LIKE '%CB%' THEN 'Combo Bag' \n      WHEN Style LIKE '%NB%' THEN\
    \ 'Net Bag'\n      WHEN Style LIKE '%WM%' THEN 'Wicketed Mesh'\n      WHEN Style\
    \ LIKE '%HD%' THEN 'Header Bag'\n      ELSE 'Bulk'\n    END as EquipmentLine,\n\
    \    COUNT(*) as OrderCount,\n    SUM(ORDERQNT - ISNULL(RESERVEQNT, 0)) as UnreservedUnits,\n\
    \    SUM(equivqnt * (ORDERQNT - ISNULL(RESERVEQNT, 0)) / ORDERQNT) as UnreservedEquivCtns\n\
    \  FROM dbo.VW_LPSALESORDERS\n  WHERE CAST(SHIPDATETIME AS DATE) >= CAST(GETDATE()\
    \ AS DATE)\n    AND ORDERQNT > 0\n    AND SOStatus IN ('Order', 'Open')\n    AND\
    \ Warehouse = 'COBBLESTONE SANGER'\n    AND ORDERQNT > ISNULL(RESERVEQNT, 0)\n\
    \  GROUP BY CASE\n    WHEN Style LIKE '%FB%' THEN 'Film Bag'\n    WHEN Style LIKE\
    \ '%CB%' THEN 'Combo Bag'\n    WHEN Style LIKE '%NB%' THEN 'Net Bag'\n    WHEN\
    \ Style LIKE '%WM%' THEN 'Wicketed Mesh'\n    WHEN Style LIKE '%HD%' THEN 'Header\
    \ Bag'\n    ELSE 'Bulk'\n  END\n)\nSELECT \n  EquipmentLine,\n  OrderCount,\n\
    \  UnreservedEquivCtns,\n  CASE EquipmentLine\n    WHEN 'Film Bag' THEN 42000\n\
    \    WHEN 'Combo Bag' THEN 20000\n    WHEN 'Net Bag' THEN 5500\n    ELSE 20000\n\
    \  END as DailyCapacity,\n  CASE \n    WHEN EquipmentLine = 'Film Bag' AND UnreservedEquivCtns\
    \ > 42000 THEN 'OVER CAPACITY'\n    WHEN EquipmentLine = 'Combo Bag' AND UnreservedEquivCtns\
    \ > 20000 THEN 'OVER CAPACITY'\n    WHEN EquipmentLine = 'Net Bag' AND UnreservedEquivCtns\
    \ > 5500 THEN 'OVER CAPACITY'\n    WHEN EquipmentLine = 'Bulk' AND UnreservedEquivCtns\
    \ > 20000 THEN 'OVER CAPACITY'\n    ELSE 'Within Capacity'\n  END as CapacityStatus\n\
    FROM OrderSummary"
  notes: "Key insights: Use ORDERQNT > ISNULL(RESERVEQNT, 0) to filter only unreserved\
    \ quantities. Equipment line capacity: FB=42k, CB=20k, NB=5.5k, Bulk=20k. Use\
    \ export_sql_to_excel for complete production schedules with individual order\
    \ lines per equipment line sheet. Critical: Food bank juice orders convert lbs\
    \ to cartons \xF740. Size substitution logic needed for film bags (\xB11 size)."
