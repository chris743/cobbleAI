- timestamp: '2026-03-04T13:39:43.431711'
  question: Full navel inventory as pivot table with size on x-axis and grade on y-axis
  sql: "SELECT \n    Grade,\n    SUM(CASE WHEN Size = '032' THEN equivctns ELSE 0\
    \ END) as [032],\n    SUM(CASE WHEN Size = '036' THEN equivctns ELSE 0 END) as\
    \ [036],\n    SUM(CASE WHEN Size = '040' THEN equivctns ELSE 0 END) as [040],\n\
    \    SUM(CASE WHEN Size = '048' THEN equivctns ELSE 0 END) as [048],\n    SUM(CASE\
    \ WHEN Size = '056' THEN equivctns ELSE 0 END) as [056],\n    SUM(CASE WHEN Size\
    \ = '072' THEN equivctns ELSE 0 END) as [072],\n    SUM(CASE WHEN Size = '088'\
    \ THEN equivctns ELSE 0 END) as [088],\n    SUM(CASE WHEN Size = '113' THEN equivctns\
    \ ELSE 0 END) as [113],\n    SUM(CASE WHEN Size = '138' THEN equivctns ELSE 0\
    \ END) as [138],\n    SUM(CASE WHEN Size = '163' THEN equivctns ELSE 0 END) as\
    \ [163],\n    SUM(equivctns) as Total\nFROM dbo.VW_BININVENTORY b\nJOIN dbo.VW_LP_COMMODITIES\
    \ c ON b.commodityidx = c.commodityidx\nWHERE b.AvailableQuantity > 0\n  AND c.Commodity\
    \ = 'NAVEL'\nGROUP BY Grade\nORDER BY Grade"
  notes: Uses equivctns for carton equivalent quantities. Joins LP inventory to LP
    commodities table. Filters for active inventory (AvailableQuantity > 0).
  verified: true
- timestamp: '2026-03-04T13:41:50.007664'
  question: Full navel inventory as a pivot table with size on the x and grade on
    the y showing bin quantities
  sql: "WITH NavelInventory AS (\n    SELECT \n        Grade,\n        Size,\n   \
    \     SUM(AvailableQuantity) as BinQuantity\n    FROM dbo.VW_BININVENTORY\n  \
    \  WHERE AvailableQuantity > 0\n      AND Commodity = 'NAVEL'\n    GROUP BY Grade,\
    \ Size\n)\nSELECT \n    Grade,\n    ISNULL([032], 0) AS '32',\n    ISNULL([036],\
    \ 0) AS '36', \n    ISNULL([040], 0) AS '40',\n    ISNULL([048], 0) AS '48',\n\
    \    ISNULL([056], 0) AS '56',\n    ISNULL([072], 0) AS '72',\n    ISNULL([088],\
    \ 0) AS '88',\n    ISNULL([113], 0) AS '113',\n    ISNULL([138], 0) AS '138',\n\
    \    ISNULL([163], 0) AS '163'\nFROM NavelInventory\nPIVOT (\n    SUM(BinQuantity)\
    \ \n    FOR Size IN ([032], [036], [040], [048], [056], [072], [088], [113], [138],\
    \ [163])\n) AS PivotTable\nORDER BY Grade"
  notes: Uses PIVOT to create cross-tab format. Size values are stored with 3-digit
    format (032, 036, etc.) in the database but displayed without leading zeros in
    column headers for readability.
  verified: false
- timestamp: '2026-03-04T13:44:53.626814'
  question: Show navel orange available quantity as pivot table with grade on Y-axis
    and size on X-axis
  sql: "SELECT \n    Grade,\n    [008] as \"8\",\n    [014] as \"14\", \n    [018]\
    \ as \"18\",\n    [024] as \"24\",\n    [032] as \"32\",\n    [040] as \"40\"\
    ,\n    [048] as \"48\",\n    [056] as \"56\",\n    [072] as \"72\",\n    [088]\
    \ as \"88\",\n    [113] as \"113\",\n    [125] as \"125\",\n    [138] as \"138\"\
    ,\n    [163] as \"163\",\n    [200] as \"200\"\nFROM (\n    SELECT \n        ISNULL(Grade,\
    \ 'NO GRADE') as Grade,\n        Size,\n        SUM(AvailableQuantity) as TotalBins\n\
    \    FROM dbo.VW_BININVENTORY\n    WHERE AvailableQuantity > 0\n      AND Commodity\
    \ = 'NAVEL'\n    GROUP BY Grade, Size\n) src\nPIVOT (\n    SUM(TotalBins)\n  \
    \  FOR Size IN ([008], [014], [018], [024], [032], [040], [048], [056], [072],\
    \ [088], [113], [125], [138], [163], [200])\n) piv\nORDER BY \n    CASE Grade\n\
    \        WHEN 'FANCY' THEN 1\n        WHEN 'EXP FANCY' THEN 2\n        WHEN 'CHOICE'\
    \ THEN 3\n        WHEN 'EXP CHOICE' THEN 4\n        WHEN 'JUICE' THEN 5\n    \
    \    ELSE 6\n    END"
  notes: Uses PIVOT to create matrix view of inventory. Handles 3-digit size format
    with leading zeros. Orders grades by market value hierarchy.
  verified: false
- timestamp: '2026-03-04T13:50:10.275194'
  question: What sizes are available for navels?
  sql: "SELECT DISTINCT Size\nFROM dbo.VW_BININVENTORY\nWHERE AvailableQuantity >\
    \ 0\n  AND Commodity = 'NAVEL'\nORDER BY Size"
  notes: Shows all current navel sizes in inventory. Size values are 3-digit strings
    with leading zeros. ORDER BY Size works for string sorting since they're all same
    format.
  verified: false
